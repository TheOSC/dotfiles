# =============================================================================
# fuzzel.ini (complete — generated by wallust)
# Do not edit manually — changes will be overwritten by wallust
# Edit the template at ~/.config/wallust/templates/fuzzel-colors.ini
# =============================================================================

[main]
font=JetBrainsMono Nerd Font:size=13
dpi-aware=auto
prompt=❯ 
icon-theme=Papirus-Dark
icons-enabled=yes
terminal=kitty -e
layer=overlay
exit-on-keyboard-focus-loss=yes
width=35
horizontal-pad=16
vertical-pad=10
inner-pad=6
lines=10

[key-bindings]
cancel=Escape
execute=Return
execute-or-next=Tab
delete-prev=BackSpace
delete-prev-word=Ctrl+BackSpace
delete-line=Ctrl+u
prev=Up
next=Down
page-up=Page_Up
page-down=Page_Down

[colors]
background={{background}}ff
text={{foreground}}ff
match={{color4}}ff
selection={{color4}}ff
selection-text={{background}}ff
selection-match={{color12}}ff
border={{color4}}ff

[border]
width=2
radius=8
