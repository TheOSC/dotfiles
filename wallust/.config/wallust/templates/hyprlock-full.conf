# Generated by wallust — do not edit manually
general {
    hide_cursor = true
}

background {
    monitor =
    path = screenshot
    blur_passes = 3
    blur_size = 7
    noise = 0.02
    contrast = 0.9
    brightness = 0.8
    vibrancy = 0.2
}

label {
    monitor =
    text = $TIME
    color = rgb({{foreground}})
    font_size = 72
    font_family = JetBrainsMono Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgb({{color7}})
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, 40
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 48
    position = 0, -100
    halign = center
    valign = center
    outline_thickness = 2
    dots_size = 0.3
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgb({{color4}})
    inner_color = rgb({{color0}})
    font_color = rgb({{foreground}})
    fade_on_empty = true
    placeholder_text = <i>password</i>
    check_color = rgb({{color2}})
    fail_color = rgb({{color1}})
    fail_text = <i>incorrect</i>
    capslock_color = rgb({{color3}})
}

label {
    monitor =
    text = $HOST
    color = rgb({{color7}})
    font_size = 13
    font_family = JetBrainsMono Nerd Font
    position = 0, -160
    halign = center
    valign = center
}
