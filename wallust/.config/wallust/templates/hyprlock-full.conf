# Generated by wallust — do not edit manually
general {
    hide_cursor = false
}

animations {
    enabled = true
    bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 5, linear
    animation = fadeOut, 1, 5, linear
    animation = inputFieldDots, 1, 2, linear
}

background {
    monitor =
    path = screenshot
    blur_passes = 5
    blur_size = 8
    noise = 0.02
    contrast = 0.8
    brightness = 0.6
    vibrancy = 0.1
    vibrancy_darkness = 0.5
}

# TIME — center, above password
label {
    monitor =
    text = $TIME
    color = rgb({{foreground}})
    font_size = 80
    font_family = JetBrainsMono Nerd Font
    position = 0, 180
    halign = center
    valign = center
}

# DATE — below time
label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %d"
    color = rgb({{color15}})
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# PASSWORD INPUT — center
input-field {
    monitor =
    size = 320, 52
    position = 0, 0
    halign = center
    valign = center
    outline_thickness = 0
    dots_size = 0.25
    dots_text_format = •
    dots_spacing = 0.3
    dots_center = true
    outer_color = rgb({{color4}})
    inner_color = rgb({{color0}})
    font_color = rgb(888888)
    fade_on_empty = false
    rounding = 26
    placeholder_text = <i>password</i>
    check_color = rgb({{color2}})
    fail_color = rgb({{color1}})
    fail_text = <i>incorrect</i>
    capslock_color = rgb({{color3}})
}

# BATTERY — bottom right
label {
    monitor =
    text = cmd[update:30000] echo "󰁹 $(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null || echo '?')%"
    color = rgb(888888)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = -60, 100
    halign = right
    valign = bottom
}

# NETWORK — below battery
label {
    monitor =
    text = cmd[update:10000] echo "󰤨 $(nmcli -t -f NAME connection show --active | grep -v wireguard | grep -v loopback | head -1 || echo 'disconnected')"
    color = rgb(888888)
    font_size = 16
    font_family = JetBrainsMono Nerd Font
    position = -60, 50
    halign = right
    valign = bottom
}
