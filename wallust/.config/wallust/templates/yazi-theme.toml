[manager]
cwd = { fg = "{{color4}}" }

hovered         = { fg = "{{background}}", bg = "{{color4}}" }
preview_hovered = { underline = true }

find_keyword  = { fg = "{{color3}}", bold = true }
find_position = { fg = "{{color5}}", bg = "reset", bold = true }

marker_copied  = { fg = "{{color2}}", bg = "{{color2}}" }
marker_cut     = { fg = "{{color1}}", bg = "{{color1}}" }
marker_marked  = { fg = "{{color6}}", bg = "{{color6}}" }
marker_selected = { fg = "{{color4}}", bg = "{{color4}}" }

[status]
separator_open  = ""
separator_close = ""

[input]
border   = { fg = "{{color4}}" }
title    = { fg = "{{color4}}" }
value    = { fg = "{{foreground}}" }
selected = { reversed = true }

[select]
border   = { fg = "{{color4}}" }
active   = { fg = "{{color4}}" }
inactive = { fg = "{{color8}}" }

[which]
mask            = { bg = "{{color0}}" }
cand            = { fg = "{{color6}}" }
rest            = { fg = "{{color8}}" }
desc            = { fg = "{{color5}}" }
separator       = "  "
separator_style = { fg = "{{color8}}" }

[notify]
title_info  = { fg = "{{color2}}" }
title_warn  = { fg = "{{color3}}" }
title_error = { fg = "{{color1}}" }

[icon]
rules = []
