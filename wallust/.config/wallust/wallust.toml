# =============================================================================
# wallust.toml
# Theme engine configuration
# Runs via: wallpaper-set <image> → wallust run <image>
# =============================================================================

# Color generation backend
# dark-vibrant: best for muted/dark wallpapers (our primary aesthetic)
# Options: dark, dark-vibrant, light, light-vibrant, full, full-vibrant
palette = "salience-dark"

# Color generation method
# kmeans: best quality, slightly slower
# Options: kmeans, median-cut, nn
backend = "kmeans"

# Threshold for color differentiation (higher = more distinct colors)
threshold = 5

# Saturation (0.0 - 1.0). Lower = more muted, fits our aesthetic
saturation = 70

# =============================================================================
# TEMPLATES
# Each entry: template file → output target path
# Template files live in ~/.config/wallust/templates/
# =============================================================================

[templates]

# Hyprland border/accent colors (Lua)
hyprland.template = "hyprland-colors.lua"
hyprland.target   = "~/.config/hypr/colors.lua"

# Waybar colors
waybar.template = "waybar-colors.css"
waybar.target   = "~/.config/waybar/colors.css"

# Kitty terminal theme
kitty.template = "kitty-theme.conf"
kitty.target   = "~/.config/kitty/theme.conf"

# Dunst notification colors
dunst.template = "dunstrc-colors"
dunst.target   = "~/.config/dunst/dunstrc"

# Fuzzel launcher colors
fuzzel.template = "fuzzel-colors.ini"
fuzzel.target   = "~/.config/fuzzel/fuzzel.ini"

# Yazi file manager theme
yazi.template = "yazi-theme.toml"
yazi.target   = "~/.config/yazi/theme.toml"

# Btop color theme
btop.template = "btop-theme"
btop.target   = "~/.config/btop/themes/wallust.theme"

# GTK colors (shared by gtk3 and gtk4 via symlink or separate targets)
gtk3.template = "gtk-colors.css"
gtk3.target   = "~/.config/gtk-3.0/colors.css"

gtk4.template = "gtk-colors.css"
gtk4.target   = "~/.config/gtk-4.0/colors.css"

# Hyprlock login screen colors
hyprlock.template = "hyprlock-colors.conf"
hyprlock.target   = "~/.config/hypr/hyprlock-colors.conf"
# Pywal-compatible colors file (for pywalfox Firefox theming)
wal.template = "wal-colors"
wal.target   = "~/.cache/wal/colors"

# Pywal-compatible colors.json (for pywalfox Firefox theming)
waljson.template = "wal-colors.json"
waljson.target   = "~/.cache/wal/colors.json"
