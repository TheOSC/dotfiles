# =============================================================================
# hypridle.conf
# Idle management — triggers screen lock and display off on inactivity
# =============================================================================
general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# =============================================================================
# ON BATTERY
# =============================================================================
# Dim after 10 minutes on battery
listener {
    timeout     = 600
    on-timeout  = upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep -q "state:.*discharging" && brightnessctl -s set 20%
    on-resume   = brightnessctl -r
}
# Lock after 15 minutes on battery (no media exception)
listener {
    timeout     = 900
    on-timeout  = upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep -q "state:.*discharging" && loginctl lock-session
}
# Screen off after 20 minutes on battery
listener {
    timeout     = 1200
    on-timeout  = upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep -q "state:.*discharging" && hyprctl dispatch dpms off
    on-resume   = hyprctl dispatch dpms on
}

# =============================================================================
# ON POWER
# =============================================================================
# Dim after 50 minutes on power
listener {
    timeout     = 3000
    on-timeout  = upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep -q "state:.*charging\|fully-charged" && brightnessctl -s set 20%
    on-resume   = brightnessctl -r
}
# Lock after 1 hour on power — skip if media playing
listener {
    timeout     = 3600
    on-timeout  = upower -i /org/freedesktop/UPower/devices/battery_BAT0 | grep -q "state:.*charging\|fully-charged" && { playerctl status 2>/dev/null | grep -q Playing || loginctl lock-session; }
}
# No screen off on power
