# =============================================================================
# hypridle.conf
# =============================================================================
general {
    lock_cmd         = pidof hyprlock || hyprlock
    before_sleep_cmd = loginctl lock-session
    after_sleep_cmd  = hyprctl dispatch dpms on
    ignore_dbus_inhibit = false
}

# =============================================================================
# ON BATTERY — aggressive
# =============================================================================
# Dim after 10 minutes
listener {
    timeout     = 600
    on-timeout  = sh -c '[ "$(cat /sys/class/power_supply/BAT0/status)" = "Discharging" ] && brightnessctl -s set 20%'
    on-resume   = brightnessctl -r
}
# Lock after 15 minutes
listener {
    timeout     = 900
    on-timeout  = sh -c '[ "$(cat /sys/class/power_supply/BAT0/status)" = "Discharging" ] && loginctl lock-session'
}
# Screen off after 20 minutes
listener {
    timeout     = 1200
    on-timeout  = sh -c '[ "$(cat /sys/class/power_supply/BAT0/status)" = "Discharging" ] && hyprctl dispatch dpms off'
    on-resume   = hyprctl dispatch dpms on
}

# =============================================================================
# ON POWER — relaxed
# =============================================================================
# Dim after 50 minutes
listener {
    timeout     = 3000
    on-timeout  = sh -c '[ "$(cat /sys/class/power_supply/BAT0/status)" != "Discharging" ] && brightnessctl -s set 20%'
    on-resume   = brightnessctl -r
}
# Lock after 1 hour — skip if media playing
listener {
    timeout     = 3600
    on-timeout  = sh -c '[ "$(cat /sys/class/power_supply/BAT0/status)" != "Discharging" ] && { playerctl status 2>/dev/null | grep -q Playing || loginctl lock-session; }'
}
# Screen off after 1 hour 10 minutes
listener {
    timeout     = 4200
    on-timeout  = sh -c '[ "$(cat /sys/class/power_supply/BAT0/status)" != "Discharging" ] && hyprctl dispatch dpms off'
    on-resume   = hyprctl dispatch dpms on
}
# Suspend after 2 hours
listener {
    timeout     = 7200
    on-timeout  = sh -c 'playerctl status 2>/dev/null | grep -q Playing || systemctl suspend'
}
