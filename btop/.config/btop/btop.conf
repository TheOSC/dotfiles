# =============================================================================
# btop.conf
# System monitor configuration
# Color theme generated by wallust at ~/.config/btop/themes/wallust.theme
# =============================================================================

# Color theme
color_theme = "wallust"

# Update interval in milliseconds
update_ms = 1500

# Custom cpu graph top line
custom_cpu_name = ""

# Disks to show in IO view
disks_filter = ""

# Show memory as bytes
mem_bytes = True

# Show disks as bytes
disk_free_prct = False

# Temperature unit
temp_scale = "celsius"

# Show cpu box at startup
shown_boxes = "cpu mem net proc"

# Processes sorting
proc_sorting = "cpu lazy"
proc_reversed = False
proc_tree = False
proc_colors = True
proc_gradient = True
proc_per_core = True
proc_mem_bytes = True
proc_cpu_graphs = True
proc_info_smaps = False
proc_left = False

# CPU options
cpu_graph_upper = "total"
cpu_graph_lower = "total"
cpu_invert_lower = True
cpu_single_graph = False
cpu_bottom = False

# Network options
net_download = 100
net_upload = 100
net_auto = True
net_sync = False
net_iface = ""

# Clock
clock_format = "%X"

# Background update
background_update = True

# Show battery
show_battery = True
selected_battery = "Auto"

# Base 10 sizes
base_10_sizes = False

# Log level
log_level = "WARNING"
