# =============================================================================
# mpv.conf
# Media player configuration
# =============================================================================

# Video
profile=gpu-hq
gpu-api=vulkan
hwdec=auto-safe

# Audio
audio-file-auto=fuzzy
audio-pitch-correction=yes
volume=80
volume-max=150

# Subtitles
sub-auto=fuzzy
sub-file-paths=subs:subtitles
slang=en

# UI
osc=yes
osd-bar=yes
osd-font="JetBrainsMono Nerd Font"
osd-font-size=32
osd-color="#d0d0d0"
osd-border-color="#1a1a1a"
osd-border-size=1

# Behavior
save-position-on-quit=yes
keep-open=yes
autofit-larger=90%x90%

# Screenshot
screenshot-format=png
screenshot-dir=~/Pictures/Screenshots
screenshot-template="%F_%P"

# Loop playlist
loop-playlist=inf
