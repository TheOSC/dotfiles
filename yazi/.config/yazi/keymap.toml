# =============================================================================
# keymap.toml
# Yazi keybindings
# Mostly defaults with a few additions
# =============================================================================

[manager]
keymap = [
    # Navigation
    { on = "k",         run = "arrow -1",           desc = "Up" },
    { on = "j",         run = "arrow 1",            desc = "Down" },
    { on = "h",         run = "leave",              desc = "Go to parent" },
    { on = "l",         run = "enter",              desc = "Enter directory" },
    { on = "<Up>",      run = "arrow -1",           desc = "Up" },
    { on = "<Down>",    run = "arrow 1",            desc = "Down" },
    { on = "<Left>",    run = "leave",              desc = "Go to parent" },
    { on = "<Right>",   run = "enter",              desc = "Enter directory" },
    { on = "<Home>",    run = "arrow -99999999",    desc = "Top" },
    { on = "<End>",     run = "arrow 99999999",     desc = "Bottom" },
    { on = "g g",       run = "arrow -99999999",    desc = "Top" },
    { on = "G",         run = "arrow 99999999",     desc = "Bottom" },
    { on = "<C-u>",     run = "arrow -50%",         desc = "Page up" },
    { on = "<C-d>",     run = "arrow 50%",          desc = "Page down" },

    # Selection
    { on = "<Space>",   run = "select --state=none", desc = "Toggle selection" },
    { on = "v",         run = "visual_mode",         desc = "Visual mode" },
    { on = "V",         run = "select_all --state=none", desc = "Select all" },

    # File operations
    { on = "o",         run = "open",               desc = "Open" },
    { on = "<Enter>",   run = "open",               desc = "Open" },
    { on = ["<S>", "<Enter>"], run = "shell 'export PATH=\"$HOME/.local/bin:/usr/local/bin:/usr/bin:/bin:$PATH\"; if [[ \"$PWD\" == *wallpapers* ]]; then \"$HOME/.local/bin/wallpaper-set\" \"$1\"; fi'", desc = "Set wallpaper" },
    { on = "O",         run = "open --interactive", desc = "Open with" },
    { on = "y",         run = "yank",               desc = "Yank (copy)" },
    { on = "x",         run = "yank --cut",         desc = "Yank (cut)" },
    { on = "p",         run = "paste",              desc = "Paste" },
    { on = "P",         run = "paste --force",      desc = "Paste (overwrite)" },
    { on = "d",         run = "remove",             desc = "Move to trash" },
    { on = "D",         run = "remove --permanently", desc = "Delete permanently" },
    { on = "a",         run = "create",             desc = "Create file/dir" },
    { on = "r",         run = "rename --cursor=before_ext", desc = "Rename" },
    { on = "c",         run = "copy path",          desc = "Copy path" },

    # View
    { on = ".",         run = "hidden toggle",      desc = "Toggle hidden files" },
    { on = "z",         run = "plugin fzf",         desc = "Jump with fzf" },
    { on = "Z",         run = "plugin zoxide",      desc = "Jump with zoxide" },
    { on = "s",         run = "shell --interactive --block", desc = "Shell here" },

    # Sort
    { on = ["s", "n"],  run = "sort natural  --dir-first", desc = "Sort: natural" },
    { on = ["s", "m"],  run = "sort modified --dir-first", desc = "Sort: modified" },
    { on = ["s", "s"],  run = "sort size     --dir-first", desc = "Sort: size" },

    # Tabs
    { on = "t",         run = "tab_create --current", desc = "New tab" },
    { on = "1",         run = "tab_switch 0",        desc = "Tab 1" },
    { on = "2",         run = "tab_switch 1",        desc = "Tab 2" },
    { on = "3",         run = "tab_switch 2",        desc = "Tab 3" },
    { on = "[",         run = "tab_switch -1 --relative", desc = "Prev tab" },
    { on = "]",         run = "tab_switch 1  --relative", desc = "Next tab" },

    # Misc
    { on = "q",         run = "quit",               desc = "Quit" },
    { on = "<Esc>",     run = "escape",             desc = "Escape" },
    { on = "?",         run = "help",               desc = "Help" },
    { on = "~",         run = "cd ~",               desc = "Go home" },
]

[input]
keymap = [
    { on = "<Enter>",   run = "submit",  desc = "Submit" },
    { on = "<Esc>",     run = "escape",  desc = "Cancel" },
    { on = "<C-c>",     run = "close",   desc = "Close" },
    { on = "<Left>",    run = "move -1", desc = "Left" },
    { on = "<Right>",   run = "move 1",  desc = "Right" },
    { on = "<Home>",    run = "move -999", desc = "Start" },
    { on = "<End>",     run = "move 999",  desc = "End" },
    { on = "<Backspace>", run = "backspace", desc = "Backspace" },
    { on = "<Delete>",  run = "delete",  desc = "Delete" },
]

[select]
keymap = [
    { on = "<Esc>",     run = "escape",     desc = "Cancel" },
    { on = "<Enter>",   run = "submit",     desc = "Submit" },
    { on = "k",         run = "arrow -1",   desc = "Up" },
    { on = "j",         run = "arrow 1",    desc = "Down" },
    { on = "<Up>",      run = "arrow -1",   desc = "Up" },
    { on = "<Down>",    run = "arrow 1",    desc = "Down" },
]
