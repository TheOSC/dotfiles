separator_close = ""

[input]
border   = { fg = "#3D5D13" }
title    = { fg = "#3D5D13" }
value    = { fg = "#A8B87C" }
selected = { reversed = true }

[select]
border   = { fg = "#3D5D13" }
active   = { fg = "#3D5D13" }
inactive = { fg = "#616E3A" }

[which]
mask            = { bg = "#05050C" }
cand            = { fg = "#475C0D" }
rest            = { fg = "#616E3A" }
desc            = { fg = "#1A2AAA" }
separator       = "  "
separator_style = { fg = "#616E3A" }

[notify]
title_info  = { fg = "#1A327F" }
title_warn  = { fg = "#1A2C95" }
title_error = { fg = "#195E2A" }

[icon]
rules = []
