[manager]
cwd = { fg = "#3D5D13" }

hovered         = { fg = "#03040A", bg = "#3D5D13" }
preview_hovered = { underline = true }

find_keyword  = { fg = "#1A2C95", bold = true }
find_position = { fg = "#1A2AAA", bg = "reset", bold = true }

marker_copied  = { fg = "#1A327F", bg = "#1A327F" }
marker_cut     = { fg = "#195E2A", bg = "#195E2A" }
marker_marked  = { fg = "#475C0D", bg = "#475C0D" }
marker_selected = { fg = "#3D5D13", bg = "#3D5D13" }

[status]
