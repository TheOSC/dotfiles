# =============================================================================
# yazi.toml
# File manager configuration
# =============================================================================

[manager]
ratio          = [1, 2, 4]    # Panel width ratios: parent, current, preview
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
show_hidden    = false
show_symlink   = true
linemode       = "size"       # Show file sizes

[preview]
tab_size       = 2
max_width      = 1200
max_height     = 900
cache_dir      = ""
image_delay    = 30
image_filter   = "triangle"
image_quality  = 85

# Use kitty graphics protocol for image previews
ueberzug_scale  = 1
ueberzug_offset = [0, 0, 0, 0]

[opener]
edit = [
    { run = 'nvim "$@"', desc = "nvim", block = true },
]
open = [
    { run = 'xdg-open "$@"',  desc = "Open", orphan = true },
]
reveal = [
    { run = 'xdg-open "$(dirname "$1")"', desc = "Reveal in Thunar", orphan = true },
]
play = [
    { run = 'mpv "$@"', desc = "mpv", orphan = true },
]
extract = [
    { run = 'unar "$1"', desc = "Extract here", block = true },
]

[open]
rules = [
    # Text/code → nvim
    { mime = "text/*",              use = "edit" },
    { mime = "application/json",    use = "edit" },
    { mime = "application/xml",     use = "edit" },
    { mime = "application/x-sh",    use = "edit" },

    # Media → mpv
    { mime = "video/*",             use = "play" },
    { mime = "audio/*",             use = "play" },

    # Images → default viewer
    { mime = "image/*",             use = "open" },

    # Archives → extract
    { mime = "application/zip",          use = "extract" },
    { mime = "application/x-tar",        use = "extract" },
    { mime = "application/x-bzip2",      use = "extract" },
    { mime = "application/x-7z-compressed", use = "extract" },
    { mime = "application/x-rar",        use = "extract" },
    { mime = "application/zstd",         use = "extract" },

    # Everything else → xdg-open
    { mime = "*",                   use = "open" },
]

[tasks]
micro_workers    = 5
macro_workers    = 10
bizarre_retry    = 5
image_alloc      = 536870912   # 512MB
image_bound      = [0, 0]
suppress_preload = false

[log]
enabled = false
