# =============================================================================
# hyprlock.conf
# Lock screen configuration
# Colors sourced from hyprlock-colors.conf (generated by wallust)
# =============================================================================

# Include wallust-generated colors
source = ~/.config/hypr/hyprlock-colors.conf

# =============================================================================
# BACKGROUND
# =============================================================================
background {
    monitor     =
    path        = screenshot                    # Blur current screen
    blur_passes = 3
    blur_size   = 7
    noise       = 0.02
    contrast    = 0.9
    brightness  = 0.8
    vibrancy    = 0.2
}

# =============================================================================
# CLOCK
# =============================================================================
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +"%H:%M")"
    color       = $foreground
    font_size   = 72
    font_family = JetBrainsMono Nerd Font
    position    = 0, 120
    halign      = center
    valign      = center
}

label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +"%A, %B %d")"
    color       = $text_dim
    font_size   = 20
    font_family = JetBrainsMono Nerd Font
    position    = 0, 40
    halign      = center
    valign      = center
}

# =============================================================================
# PASSWORD INPUT
# =============================================================================
input-field {
    monitor         =
    size            = 280, 48
    position        = 0, -100
    halign          = center
    valign          = center

    outline_thickness   = 2
    dots_size           = 0.3
    dots_spacing        = 0.2
    dots_center         = true

    outer_color         = $accent
    inner_color         = $surface
    font_color          = $foreground
    fade_on_empty       = true
    placeholder_text    = <i>password</i>

    check_color         = $accent2
    fail_color          = $error
    fail_text           = <i>incorrect</i>

    capslock_color      = $warning
}

# =============================================================================
# HOSTNAME LABEL
# =============================================================================
label {
    monitor     =
    text        = $HOST
    color       = $text_dim
    font_size   = 13
    font_family = JetBrainsMono Nerd Font
    position    = 0, -160
    halign      = center
    valign      = center
}
