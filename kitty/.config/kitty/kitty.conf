# =============================================================================
# kitty.conf
# Terminal configuration
# Colors sourced from theme.conf (generated by wallust)
# =============================================================================

# =============================================================================
# INCLUDE GENERATED THEME
# =============================================================================
include theme.conf

# =============================================================================
# FONT
# =============================================================================
font_family      JetBrainsMono Nerd Font
bold_font        JetBrainsMono Nerd Font Bold
italic_font      JetBrainsMono Nerd Font Italic
bold_italic_font JetBrainsMono Nerd Font Bold Italic
font_size        12.0

# Ligatures
disable_ligatures never

# =============================================================================
# CURSOR
# =============================================================================
cursor_shape           block
cursor_blink_interval  0        # No blinking
cursor_stop_blinking_after 0

# =============================================================================
# SCROLLBACK
# =============================================================================
scrollback_lines       10000
scrollback_pager       nvim +Man!
wheel_scroll_multiplier 3.0

# =============================================================================
# MOUSE
# =============================================================================
mouse_hide_wait        2.0      # Hide mouse after 2s of inactivity
copy_on_select         no
focus_follows_mouse    no

# =============================================================================
# WINDOW
# =============================================================================
remember_window_size   no
initial_window_width   120c
initial_window_height  36c

window_padding_width   8
window_margin_width    0

hide_window_decorations yes     # No title bar — Hyprland handles decoration

# =============================================================================
# TAB BAR
# =============================================================================
tab_bar_edge           bottom
tab_bar_style          powerline
tab_powerline_style    slanted
tab_title_template     "{index}: {title}"
tab_bar_min_tabs       2        # Only show tab bar when multiple tabs open

# =============================================================================
# PERFORMANCE
# =============================================================================
repaint_delay          8        # ~120fps
input_delay            1
sync_to_monitor        yes

# =============================================================================
# BELL
# =============================================================================
enable_audio_bell      no
visual_bell_duration   0.0

# =============================================================================
# ADVANCED
# =============================================================================
shell                  zsh
editor                 nvim
close_on_child_death   no
allow_remote_control   yes      # Needed for kitty @ commands and theme reload
listen_on              unix:/tmp/kitty

# =============================================================================
# KEYBOARD SHORTCUTS
# Clear defaults and define only what we need
# =============================================================================
clear_all_shortcuts    yes

# Clipboard
map ctrl+shift+c        copy_to_clipboard
map ctrl+shift+v        paste_from_clipboard

# Scrollback
map ctrl+shift+up       scroll_line_up
map ctrl+shift+down     scroll_line_down
map ctrl+shift+page_up  scroll_page_up
map ctrl+shift+page_down scroll_page_down
map ctrl+shift+home     scroll_home
map ctrl+shift+end      scroll_end

# Font size
map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Tabs
map ctrl+shift+t        new_tab_with_cwd
map ctrl+shift+w        close_tab
map ctrl+shift+right    next_tab
map ctrl+shift+left     previous_tab

# Windows (splits within kitty)
map ctrl+shift+enter    new_window_with_cwd
map ctrl+shift+]        next_window
map ctrl+shift+[        previous_window

# Misc
map ctrl+shift+f        show_scrollback
map ctrl+shift+r        load_config_file
map ctrl+l              clear_terminal scroll active
