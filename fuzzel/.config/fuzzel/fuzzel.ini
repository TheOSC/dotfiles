# =============================================================================
# fuzzel.ini
# App launcher configuration
# Colors sourced from colors.ini (generated by wallust)
# =============================================================================

[main]
font=JetBrainsMono Nerd Font:size=13
dpi-aware=auto
prompt=❯ 
icon-theme=Papirus-Dark
icons-enabled=yes
terminal=kitty -e
layer=overlay
exit-on-keyboard-focus-loss=yes

# Layout
width=35
horizontal-pad=16
vertical-pad=10
inner-pad=6
lines=10

[key-bindings]
cancel=Escape
execute=Return
execute-or-next=Tab
delete-prev=BackSpace
delete-prev-word=Ctrl+BackSpace
delete-line=Ctrl+u
prev=Up
next=Down
page-up=Page_Up
page-down=Page_Down

[colors]
# These are defaults — wallust overwrites via colors.ini include
# Fuzzel supports an include via the colors section directly
background=1a1a1aff
text=d0d0d0ff
match=5f8aabff
selection=5f8aabff
selection-text=1a1a1aff
selection-match=81a2beff
border=5f8aabff

[border]
width=2
radius=8
